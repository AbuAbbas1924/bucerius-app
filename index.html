<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1">
  <title>Auswahltest-Trainer &middot; Bucerius Law School</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script defer
          src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] {
      display: none !important
    }
    .opt-idle {
      border-color: #e5e7eb;
      background: #fff
    }
    .opt-idle:hover {
      border-color: #9ca3af
    }
    .opt-sel {
      border-color: #921925;
      background: rgba(146, 25, 37, .06)
    }
    .opt-correct {
      border-color: #16a34a;
      background: #f0fdf4
    }
    .opt-wrong {
      border-color: #ef4444;
      background: #fef2f2
    }
    .opt-muted {
      border-color: #e5e7eb;
      background: #fff;
      opacity: .6
    }
    .lt-idle {
      border-color: #d1d5db;
      color: #4b5563;
      background: #fff
    }
    .lt-sel {
      border-color: #921925;
      background: #921925;
      color: #fff
    }
    .lt-correct {
      border-color: #16a34a;
      background: #16a34a;
      color: #fff
    }
    .lt-wrong {
      border-color: #ef4444;
      background: #ef4444;
      color: #fff
    }
    .lt-muted {
      border-color: #d1d5db;
      color: #9ca3af;
      background: #fff
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 antialiased">
  <div x-data="trainer()"
       x-init="init()"
       x-cloak
       class="flex flex-col min-h-screen">
    <header class="bg-white border-gray-200 border-b">
      <div class="flex items-center gap-3 mx-auto px-4 py-4 max-w-3xl">
        <div class="bg-[#921925] rounded-sm w-2.5 h-8"></div>
        <div class="leading-tight">
          <div class="font-semibold text-[#921925] text-[11px] uppercase tracking-[0.18em]">Bucerius Law School &middot;
            ITB</div>
          <h1 class="font-semibold text-lg">Auswahltest&#8209;Trainer</h1>
        </div>
        <button @click="showSpick=true"
                class="ml-auto px-3 py-1.5 border border-gray-300 hover:border-gray-500 rounded-md font-medium text-gray-700 hover:text-gray-900 text-sm">
          Spickzettel
        </button>
      </div>
    </header>
    <main class="flex-1 mx-auto px-4 py-6 w-full max-w-3xl">
      <template x-if="loading">
        <div class="py-24 text-gray-500 text-center">Aufgaben werden geladen &hellip;</div>
      </template>
      <template x-if="error">
        <div class="bg-white p-6 border border-gray-200 rounded-xl">
          <h2 class="mb-2 font-semibold text-lg">Fragen konnten nicht geladen werden</h2>
          <p class="mb-4 text-gray-600 text-sm">Die Datei <code class="font-mono">data.json</code> muss neben <code
                  class="font-mono">index.html</code> liegen und ueber einen kleinen lokalen Server geoeffnet werden
            (Browser blockieren das direkte Laden per Doppelklick).</p>
          <p class="mb-1 text-gray-600 text-sm">So startest du den Server &ndash; im Ordner mit beiden Dateien:</p>
          <pre
               class="bg-gray-900 p-3 rounded-md overflow-x-auto text-gray-100 text-sm"><code>python3 -m http.server 8000</code></pre>
          <p class="mt-2 text-gray-600 text-sm">Dann im Browser oeffnen: <code
                  class="font-mono">http://localhost:8000</code></p>
        </div>
      </template>
      <template x-if="ready">
        <div>
          <div class="flex flex-wrap items-center gap-2 mb-5">
            <div class="inline-flex bg-gray-200 p-1 rounded-lg">
              <button @click="setMode('lernen')"
                      :class="mode==='lernen' ? 'bg-white shadow text-gray-900' : 'text-gray-600'"
                      class="px-3 py-1.5 rounded-md font-medium text-sm">Lernmodus</button>
              <button @click="setMode('pruefung')"
                      :class="mode==='pruefung' ? 'bg-white shadow text-gray-900' : 'text-gray-600'"
                      class="px-3 py-1.5 rounded-md font-medium text-sm">Pr&uuml;fungsmodus</button>
            </div>
            <template x-if="mode==='lernen'">
              <div class="flex flex-wrap gap-2">
                <select x-model="fGruppe"
                        @change="buildPool()"
                        class="bg-white px-2.5 py-1.5 border border-gray-300 rounded-md text-sm">
                  <option value="alle">Alle Gruppen</option>
                  <template x-for="g in gruppenArr"
                            :key="g.key">
                    <option :value="g.key"
                            x-text="g.name"></option>
                  </template>
                </select>
                <select x-model="fSchwer"
                        @change="buildPool()"
                        class="bg-white px-2.5 py-1.5 border border-gray-300 rounded-md text-sm">
                  <option value="alle">Alle Schwierigkeiten</option>
                  <option value="leicht">leicht</option>
                  <option value="mittel">mittel</option>
                  <option value="schwer">schwer</option>
                </select>
              </div>
            </template>
            <template x-if="mode==='lernen'">
              <div class="ml-auto text-gray-500 text-sm">
                <span x-text="answered"></span> bearbeitet &middot;
                <span class="font-semibold text-[#921925]"
                      x-text="correct"></span> richtig
              </div>
            </template>
          </div>
          <template x-if="mode==='pruefung' && !examStarted">
            <div class="bg-white p-6 border border-gray-200 rounded-xl">
              <h2 class="mb-2 font-semibold text-xl">Pr&uuml;fungssimulation</h2>
              <p class="mb-4 text-gray-600 text-sm">Getaktet nach den amtlichen Zeiten. Kein Sofort&#8209;Feedback
                &ndash; die Aufl&ouml;sung kommt nach der Abgabe. Kein Punktabzug: im Zweifel raten.</p>
              <div class="flex flex-wrap gap-2 mb-4">
                <button @click="examScope='alle'"
                        :class="examScope==='alle' ? 'border-[#921925] text-[#921925] bg-[#921925]/5' : 'border-gray-300 text-gray-700'"
                        class="px-3 py-1.5 border rounded-md font-medium text-sm">Alle Gruppen</button>
                <template x-for="g in gruppenArr"
                          :key="g.key">
                  <button @click="examScope=g.key"
                          :class="examScope===g.key ? 'border-[#921925] text-[#921925] bg-[#921925]/5' : 'border-gray-300 text-gray-700'"
                          class="px-3 py-1.5 border rounded-md font-medium text-sm"
                          x-text="g.name"></button>
                </template>
              </div>
              <p class="mb-4 text-gray-500 text-sm"><span x-text="scopeCount()"></span> Aufgaben &middot; geplante Zeit
                <span class="font-semibold"
                      x-text="fmt(scopeTime())"></span>
              </p>
              <button @click="startExam()"
                      class="bg-[#921925] hover:bg-[#76141d] px-5 py-2.5 rounded-md font-semibold text-white text-sm">Test
                starten</button>
            </div>
            </template>
          <template x-if="mode==='pruefung' && examFinished">
            <div class="bg-white mb-5 p-6 border border-gray-200 rounded-xl">
              <div class="flex flex-wrap items-end gap-4">
                <div>
                  <div class="font-semibold text-4xl"
                       x-text="examScore() + ' / ' + total"></div>
                  <div class="mt-1 text-gray-500 text-sm"
                       x-text="Math.round(examScore()/Math.max(total,1)*100) + ' % richtig'"></div>
                </div>
                <div class="flex gap-2 ml-auto">
                  <button @click="exitExam()"
                          class="px-4 py-2 border border-gray-300 hover:border-gray-500 rounded-md font-medium text-sm">Zum
                    Lernmodus</button>
                  <button @click="examStarted=false;examFinished=false"
                          class="bg-[#921925] hover:bg-[#76141d] px-4 py-2 rounded-md font-semibold text-white text-sm">Neuer
                    Test</button>
                </div>
              </div>
              <div class="gap-3 grid grid-cols-2 sm:grid-cols-4 mt-5">
                <template x-for="r in examPerGroup()"
                          :key="r.key">
                  <div class="p-3 border border-gray-200 border-l-[#921925] border-l-4 rounded-lg">
                    <div class="font-medium text-gray-500 text-xs"
                         x-text="r.kurz"></div>
                    <div class="mt-0.5 font-semibold text-xl"
                         x-text="r.ok + '/' + r.n"></div>
                  </div>
                </template>
              </div>
              <p class="mt-4 text-gray-500 text-sm">Bl&auml;ttere unten durch alle Aufgaben &ndash; mit Aufl&ouml;sung
                und Lerntipp.</p>
            </div>
            </template>
          <template x-if="(mode==='lernen' || (mode==='pruefung' && examStarted)) && cur()">
            <div class="bg-white p-5 sm:p-7 border border-gray-200 rounded-xl">
              <div class="flex flex-wrap items-center gap-3 mb-3">
                <span class="font-semibold text-[#921925] text-[11px] uppercase tracking-wider"
                      x-text="data.gruppen[cur().gruppe].kurz"></span>
                <span class="text-gray-500 text-xs"
                      x-text="skillName(cur().skill)"></span>
                <span class="bg-gray-100 px-2 py-0.5 rounded-full text-[11px] text-gray-600 capitalize"
                      x-text="cur().schwierigkeit"></span>
                <span class="ml-auto font-medium text-gray-400 text-xs"
                      x-text="'Frage ' + (idx+1) + ' / ' + total"></span>
              </div>
              <div class="mb-4">
                <template x-if="cur().gruppe!=='sprachstile'">
                  <div>
                    <span
                          class="inline-block bg-[#921925]/5 px-3 py-1.5 border border-[#921925]/30 rounded-md font-semibold text-[#921925] text-sm">
                      Gefragt: <span x-text="verbLabel(cur().frageverb)"></span>
                    </span>
                    <p class="mt-1.5 text-gray-500 text-xs italic"
                       x-text="verbHint(cur().frageverb)"></p>
                  </div>
                  </template>
                <template x-if="cur().gruppe==='sprachstile'">
                  <div>
                    <span
                          class="inline-block bg-[#921925]/5 px-3 py-1.5 border border-[#921925]/30 rounded-md font-semibold text-[#921925] text-sm">Stil&#8209;L&uuml;cke</span>
                    <p class="mt-1.5 text-gray-500 text-xs italic">Nur Stil &amp; Register z&auml;hlen &ndash; nicht der
                      Inhalt.</p>
                  </div>
                </template>
              </div>
              <template x-if="cur().gruppe==='sprachstile'">
                <div class="bg-gray-50 p-4 border border-gray-200 rounded-lg text-[17px] leading-relaxed">
                  <span x-text="passage().a"></span><span
                        class="inline-block mx-1 border-[#921925] border-b-2 border-dashed min-w-[70px] font-mono text-[#921925] text-sm text-center">&nbsp;?&nbsp;</span><span
                        x-text="passage().b"></span>
                </div>
              </template>
              <template x-if="cur().gruppe==='indizien'">
                <div>
                  <p class="mb-3"
                     x-text="cur().kontext"></p>
                  <ol class="space-y-2">
                    <template x-for="(p,i) in cur().praemissen"
                              :key="i">
                      <li class="flex gap-3 bg-gray-50 px-3 py-2.5 border border-gray-200 rounded-lg">
                        <span class="place-items-center grid bg-[#921925] rounded w-6 h-6 font-mono font-semibold text-white text-xs shrink-0"
                              x-text="i+1"></span>
                        <span class="text-[15px] leading-snug"
                              x-text="p"></span>
                      </li>
                    </template>
                  </ol>
                </div>
                </template>
              <template x-if="cur().gruppe==='faelle'">
                <div>
                  <div class="mb-1.5 text-[11px] text-gray-400 uppercase tracking-wider">Gesetzestext</div>
                  <pre class="bg-gray-50 p-4 border border-gray-200 border-l-[#921925] border-l-4 rounded-r-lg font-mono text-[13px] leading-relaxed whitespace-pre-wrap"
                       x-text="cur().norm"></pre>
                  <div class="mt-4 mb-1.5 text-[11px] text-gray-400 uppercase tracking-wider">Sachverhalt</div>
                  <p class="text-[15px] leading-relaxed"
                     x-text="cur().sachverhalt"></p>
                </div>
                </template>
              <template x-if="cur().gruppe==='planen'">
                <div class="bg-gray-50 p-4 border border-gray-200 rounded-lg">
                  <div class="mb-2 font-semibold"
                       x-text="scen().titel"></div>
                  <div class="text-gray-700 text-sm leading-relaxed whitespace-pre-wrap"
                       x-text="scen().kontext"></div>
                  <template x-for="(t,ti) in scen().tabellen"
                            :key="ti">
                    <div class="mt-4 overflow-x-auto">
                      <div class="mb-1 font-semibold text-gray-600 text-xs"
                           x-text="t.titel"></div>
                      <table class="border border-gray-200 w-full text-[13px] border-collapse">
                        <thead>
                          <tr>
                            <template x-for="(h,hi) in t.kopf"
                                      :key="hi">
                              <th class="bg-gray-100 px-2.5 py-1.5 border border-gray-200 font-semibold text-left"
                                  x-text="h"></th>
                            </template>
                          </tr>
                        </thead>
                        <tbody>
                          <template x-for="(row,ri) in t.zeilen"
                                    :key="ri">
                            <tr>
                              <template x-for="(c,ci) in row"
                                        :key="ci">
                                <td class="px-2.5 py-1.5 border border-gray-200 align-top"
                                    :class="ci===0 ? 'font-medium text-gray-900 whitespace-nowrap' : 'text-gray-600'"
                                    x-text="c"></td>
                              </template>
                            </tr>
                          </template>
                        </tbody>
                        </table>
                        </div>
                        </template>
                        </div>
                        </template>
              <p class="mt-5 mb-4 font-semibold text-[17px] leading-snug"
                 x-text="cur().frage"></p>
              <template x-if="cur().thesen">
                <div class="space-y-2 mb-4">
                  <template x-for="(t,i) in cur().thesen"
                            :key="i">
                    <div class="px-4 py-3 border border-gray-300 rounded-lg text-[15px] leading-snug"
                         x-text="t"></div>
                  </template>
                </div>
              </template>
              <div class="space-y-2">
                <template x-for="(o,i) in cur().optionen"
                          :key="i">
                  <button @click="select(i)"
                          :disabled="locked()"
                          class="flex items-start gap-3 px-4 py-3 border rounded-lg w-full text-left transition"
                          :class="optClass(i)">
                    <span class="place-items-center grid border rounded-md w-7 h-7 font-mono font-semibold text-sm shrink-0"
                          :class="letterClass(i)"
                          x-text="letter(i)"></span>
                    <span class="pt-0.5 text-[15px] leading-snug"
                          x-text="o.text"></span>
                    <span x-show="locked() && o.richtig"
                          class="ml-auto font-bold text-green-600">&#10003;</span>
                    <span x-show="locked() && !o.richtig && selected===i"
                          class="ml-auto font-bold text-red-500">&#10007;</span>
                  </button>
                </template>
              </div>
              <div class="flex items-center gap-2 mt-5">
                <template x-if="mode==='lernen' && !checked">
                  <button @click="check()"
                          :disabled="selected===null"
                          class="bg-[#921925] hover:bg-[#76141d] disabled:opacity-40 px-5 py-2.5 rounded-md font-semibold text-white text-sm">Pr&uuml;fen</button>
                </template>
                <template x-if="mode==='lernen' && checked">
                  <button @click="next()"
                          :disabled="idx>=total-1"
                          class="bg-[#921925] hover:bg-[#76141d] disabled:opacity-40 px-5 py-2.5 rounded-md font-semibold text-white text-sm">N&auml;chste
                    Aufgabe</button>
                </template>
                <div class="flex gap-2 ml-auto">
                  <button @click="prev()"
                          :disabled="idx<=0"
                          class="disabled:opacity-40 px-4 py-2 border border-gray-300 hover:border-gray-500 rounded-md font-medium text-sm">Zur&uuml;ck</button>
                  <template x-if="!(mode==='lernen' && checked)">
                    <button @click="next()"
                            :disabled="idx>=total-1"
                            class="disabled:opacity-40 px-4 py-2 border border-gray-300 hover:border-gray-500 rounded-md font-medium text-sm">Weiter</button>
                  </template>
                  </div>
                  </div>
              <template x-if="locked()">
                <div class="mt-5 p-4 border-l-4 rounded-lg"
                     :class="answeredThis() ? (isRight() ? 'border-l-green-600 bg-green-50 border border-green-200' : 'border-l-red-500 bg-red-50 border border-red-200') : 'border-l-gray-400 bg-gray-50 border border-gray-200'">
                  <div class="mb-1.5 font-semibold"
                       :class="answeredThis() ? (isRight() ? 'text-green-700' : 'text-red-700') : 'text-gray-600'"
                       x-text="answeredThis() ? (isRight() ? '\u2713 Richtig' : '\u2717 Nicht ganz') : 'Nicht beantwortet \u2013 richtige L\u00f6sung markiert'">
                  </div>
                  <p class="text-[14px] text-gray-800 leading-relaxed"
                     x-text="cur().erklaerung"></p>
                  <template x-if="cur().gruppe==='planen' && scen().loesungstabelle">
                    <div class="mt-4 overflow-x-auto">
                      <div class="mb-1 font-semibold text-gray-600 text-xs"
                           x-text="scen().loesungstabelle.titel"></div>
                      <table class="border border-gray-200 w-full text-[13px] border-collapse">
                        <thead>
                          <tr>
                            <template x-for="(h,hi) in scen().loesungstabelle.kopf"
                                      :key="hi">
                              <th class="bg-gray-100 px-2.5 py-1.5 border border-gray-200 font-semibold text-left"
                                  x-text="h"></th>
                            </template>
                          </tr>
                        </thead>
                        <tbody>
                          <template x-for="(row,ri) in scen().loesungstabelle.zeilen"
                                    :key="ri">
                            <tr>
                              <template x-for="(c,ci) in row"
                                        :key="ci">
                                <td class="px-2.5 py-1.5 border border-gray-200 align-top"
                                    :class="ci===0 ? 'font-medium text-gray-900 whitespace-nowrap' : 'text-gray-600'"
                                    x-text="c"></td>
                              </template>
                            </tr>
                          </template>
                        </tbody>
                        </table>
                        </div>
                        </template>
                  <div class="flex gap-2 bg-[#921925]/5 mt-3 px-3 py-2.5 border border-[#921925]/20 rounded-md">
                    <span class="pt-0.5 font-semibold text-[#921925] text-[10px] uppercase tracking-wider shrink-0">Merke</span>
                    <p class="text-[13px] text-gray-800 leading-snug"
                       x-text="cur().lerntipp"></p>
                  </div>
                </div>
                </template>
            </div>
          </template>
          <template x-if="mode==='lernen' && !cur()">
            <div class="bg-white p-8 border border-gray-200 rounded-xl text-gray-500 text-center">
              Keine Aufgaben f&uuml;r diese Auswahl. Filter anpassen.
            </div>
          </template>
          <p class="mt-6 text-[11px] text-gray-400 text-center leading-relaxed"
             x-text="data.meta.quelle"></p>
        </div>
      </template>
    </main>
    <template x-if="mode==='pruefung' && examStarted && !examFinished">
      <div class="bottom-0 sticky bg-white/95 backdrop-blur border-gray-200 border-t">
        <div class="flex items-center gap-3 mx-auto px-4 py-3 max-w-3xl">
          <div class="font-mono font-semibold text-lg"
               :class="timeLeft<60 ? 'text-red-600' : 'text-gray-900'"
               x-text="fmt(timeLeft)"></div>
          <div class="text-gray-500 text-sm"
               x-text="Object.keys(answers).length + ' / ' + total + ' beantwortet'"></div>
          <button @click="submit()"
                  class="bg-[#921925] hover:bg-[#76141d] ml-auto px-5 py-2 rounded-md font-semibold text-white text-sm">Abgeben</button>
        </div>
      </div>
    </template>
    <template x-if="showSpick">
      <div class="z-50 fixed inset-0">
        <div class="absolute inset-0 bg-black/40"
             @click="showSpick=false"></div>
        <div class="top-0 right-0 bottom-0 absolute flex flex-col bg-white shadow-xl w-full max-w-md">
          <div class="flex items-center px-5 py-4 border-gray-200 border-b">
            <h2 class="font-semibold text-lg">Spickzettel</h2>
            <button @click="showSpick=false"
                    class="ml-auto text-gray-500 hover:text-gray-900 text-xl leading-none">&times;</button>
          </div>
          <div class="space-y-6 px-5 py-4 overflow-y-auto">
            <template x-for="s in lernhilfenArr"
                      :key="s.title">
              <div>
                <h3 class="mb-2 font-semibold text-[#921925] text-xs uppercase tracking-wider"
                    x-text="s.title"></h3>
                <ul class="space-y-1.5">
                  <template x-for="(it,i) in s.items"
                            :key="i">
                    <li class="relative pl-4 text-[13px] text-gray-700 leading-snug">
                      <span class="top-2 left-0 absolute bg-[#921925] rounded-full w-1.5 h-1.5"></span>
                      <span x-text="it"></span>
                    </li>
                  </template>
                </ul>
              </div>
              </template>
          </div>
        </div>
      </div>
    </template>
  </div>
  <script>
      function trainer() {
        return {
          loading: true, ready: false, error: false,
          data: null, gruppenArr: [], lernhilfenArr: [],
          mode: 'lernen', fGruppe: 'alle', fSchwer: 'alle',
          pool: [], idx: 0, selected: null, checked: false,
          answeredSet: new Set(), correctSet: new Set(),
          showSpick: false,
          examScope: 'alle', examStarted: false, examFinished: false, answers: {},
          timeLeft: 0, planned: 0, timer: null,
        init() {
          fetch('data.json', { cache: 'no-store' })
            .then(r => { if (!r.ok) throw new Error('http'); return r.json(); })
            .then(d => {
              this.data = d;
              this.gruppenArr = Object.keys(d.gruppen).map(k => Object.assign({ key: k }, d.gruppen[k]));
              this.lernhilfenArr = Object.keys(d.lernhilfen).map(t => ({ title: t, items: d.lernhilfen[t] }));
              d.aufgaben.forEach(a => { if (a.gruppe === 'sprachstile') this.shuffle(a.optionen); });
              this.buildPool();
              this.loading = false; this.ready = true;
            })
            .catch(() => { this.loading = false; this.error = true; });
          },
          shuffle(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[arr[i], arr[j]] = [arr[j], arr[i]]; } },
        gOrder: { sprachstile: 0, planen: 1, indizien: 2, faelle: 3 },
        dOrder: { leicht: 0, mittel: 1, schwer: 2 },
        buildPool() {
          let list = this.data.aufgaben.filter(a =>
            (this.fGruppe === 'alle' || a.gruppe === this.fGruppe) &&
            (this.fSchwer === 'alle' || a.schwierigkeit === this.fSchwer));
          list.sort((a, b) => (this.gOrder[a.gruppe] - this.gOrder[b.gruppe]) || (this.dOrder[a.schwierigkeit] - this.dOrder[b.schwierigkeit]) || a.id.localeCompare(b.id));
          this.pool = list; this.idx = 0; this.selected = null; this.checked = false;
          },
        cur() { return this.pool[this.idx] || null; },
        get total() { return this.pool.length; },
        scen() { const q = this.cur(); return (q && q.szenario && this.data.szenarien[q.szenario]) || { titel: '', kontext: '', tabellen: [] }; },
        passage() { const k = (this.cur() && this.cur().kontext) || ''; const i = k.indexOf('____'); return i < 0 ? { a: k, b: '' } : { a: k.slice(0, i), b: k.slice(i + 4) }; },
        skillName(id) { return (this.data.skills[id] && this.data.skills[id].name) || id; },
        letter(i) { return String.fromCharCode(65 + i); },
        verbLabel(v) { return ({ ableitbar: 'Ableitbar?', vereinbar: 'Vereinbar?', widerspruch: 'Widerspruch?', trifft_zu: 'Trifft zu?', kann: 'Kann sein?' })[v] || 'Pr\u00fcfen'; },
        verbHint(v) {
          return ({
            ableitbar: 'Nur was zwingend (logisch) folgt.',
            vereinbar: 'Was m\u00f6glich ist, ohne Widerspruch.',
            widerspruch: 'Was den Aussagen widerspricht.',
            trifft_zu: 'Gilt in jeder g\u00fcltigen Planung; jede Aussage einzeln pr\u00fcfen.',
            kann: 'Ein einziges g\u00fcltiges Beispiel gen\u00fcgt.'
          })[v] || '';
          },
        locked() { return this.mode === 'lernen' ? this.checked : this.examFinished; },
        sel() { return this.mode === 'pruefung' ? (this.answers[this.cur().id] ?? null) : this.selected; },
        select(i) {
          if (this.locked()) return;
          this.selected = i;
          if (this.mode === 'pruefung') this.answers[this.cur().id] = i;
        },
        check() {
          if (this.mode !== 'lernen' || this.selected === null) return;
          this.checked = true;
          const q = this.cur(), id = q.id;
          if (!this.answeredSet.has(id)) { this.answeredSet.add(id); if (q.optionen[this.selected].richtig) this.correctSet.add(id); }
        },
        answeredThis() { return this.sel() !== null && this.sel() !== undefined; },
        isRight() { const s = this.sel(); return s != null && this.cur().optionen[s] && this.cur().optionen[s].richtig; },
        optClass(i) {
          const s = this.sel();
          if (!this.locked()) return s === i ? 'opt-sel' : 'opt-idle';
          const o = this.cur().optionen[i];
          if (o.richtig) return 'opt-correct';
          if (s === i) return 'opt-wrong';
          return 'opt-muted';
        },
        letterClass(i) {
          const s = this.sel();
          if (!this.locked()) return s === i ? 'lt-sel' : 'lt-idle';
          const o = this.cur().optionen[i];
          if (o.richtig) return 'lt-correct';
          if (s === i) return 'lt-wrong';
          return 'lt-muted';
          },
        next() { if (this.idx < this.total - 1) { this.idx++; this.selected = null; this.checked = false; window.scrollTo({ top: 0, behavior: 'smooth' }); } },
          prev() { if (this.idx > 0) { this.idx--; this.selected = null; this.checked = false; window.scrollTo({ top: 0, behavior: 'smooth' }); } },
        get answered() { return this.answeredSet.size; },
          get correct() { return this.correctSet.size; },
        setMode(m) {
          if (m === this.mode) { return; }
          clearInterval(this.timer);
          this.mode = m; this.examStarted = false; this.examFinished = false; this.selected = null; this.checked = false;
          if (m === 'lernen') this.buildPool();
          },
        scopeList() { return this.data.aufgaben.filter(a => this.examScope === 'alle' || a.gruppe === this.examScope); },
        scopeCount() { return this.scopeList().length; },
        scopeTime() { return this.scopeList().reduce((s, a) => s + (this.data.gruppen[a.gruppe].zeitProAufgabeSek || 60), 0); },
        startExam() {
          F
                  this.answers = {};
                  let list = this.scopeList().slice();
                  list.sort((a, b) => (this.gOrder[a.gruppe] - this.gOrder[b.gruppe]) || (this.dOrder[a.schwierigkeit] - this.dOrder[b.schwierigkeit]) || a.id.localeCompare(b.id));
                  this.pool = list; this.idx = 0; this.selected = null; this.checked = false;
                  this.examStarted = true; this.examFinished = false;
                  this.planned = this.scopeTime(); this.timeLeft = this.planned;
                  clearInterval(this.timer);
                  this.timer = setInterval(() => { if (this.timeLeft > 0) { this.timeLeft--; } else { this.submit(); } }, 1000);
                  window.scrollTo({ top: 0, behavior: 'smooth' });
                },
                submit() { clearInterval(this.timer); this.examFinished = true; this.idx = 0; this.selected = null; window.scrollTo({ top: 0, behavior: 'smooth' }); },
                exitExam() { clearInterval(this.timer); this.mode = 'lernen'; this.examStarted = false; this.examFinished = false; this.buildPool(); },
                examScore() { let n = 0; this.pool.forEach(q => { const a = this.answers[q.id]; if (a != null && q.optionen[a] && q.optionen[a].richtig) n++; }); return n; },
                examPerGroup() {
                  const map = {};
                  this.pool.forEach(q => { if (!map[q.gruppe]) map[q.gruppe] = { key: q.gruppe, kurz: this.data.gruppen[q.gruppe].kurz, ok: 0, n: 0 }; map[q.gruppe].n++; const a = this.answers[q.id]; if (a != null && q.optionen[a] && q.optionen[a].richtig) map[q.gruppe].ok++; });
                  return Object.values(map);
                },
                fmt(s) { s = Math.max(0, Math.floor(s)); const m = Math.floor(s / 60), r = s % 60; return m + ':' + (r < 10 ? '0' : '') + r; },
              };
